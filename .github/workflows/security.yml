name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday — catch newly disclosed vulns

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (fail on high/critical)
        # --prod: audit only production dependencies. devDependencies (vitest,
        # playwright, etc.) are never shipped — the package's `files` is just
        # dist — so a dev-only advisory shouldn't gate releases.
        run: pnpm audit --prod --audit-level high

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Scan
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/nodejs \
            --error \
            --sarif \
            --output semgrep.sarif
        env:
          # Optional: set SEMGREP_APP_TOKEN for dashboard reporting
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        # Requires GitHub Advanced Security (free for public repos)
        continue-on-error: true

  gitleaks:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history so all commits are scanned

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is optional for public repos
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript'
