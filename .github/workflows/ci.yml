name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm --filter './packages/plugin' build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        # Lint the published package. The example app's lint is skipped in CI:
        # eslint-config-next@16 can't resolve next's bundled babel eslint-parser
        # under pnpm's isolated node_modules in a clean install (it works locally
        # where next is hoisted). Restore once that upstream issue is resolved.
        run: pnpm --filter './packages/plugin' lint

      - name: Test
        run: pnpm test
