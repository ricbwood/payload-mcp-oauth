name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm --filter './packages/plugin' build

      - name: Check doc examples compile
        # Type-checks the ```ts``` blocks in README.md / INSTALL_FOR_AGENTS.md
        # against the real plugin + @payloadcms/plugin-mcp types, so a bad example
        # (e.g. a config property at the wrong level) can't ship for a consumer or
        # an install agent to copy-paste. Uses the plugin dist built above.
        run: node scripts/check-doc-snippets.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        # Lint the published package. The example app's lint is skipped in CI:
        # eslint-config-next@16 can't resolve next's bundled babel eslint-parser
        # under pnpm's isolated node_modules in a clean install (it works locally
        # where next is hoisted). Restore once that upstream issue is resolved.
        run: pnpm --filter './packages/plugin' lint

      - name: Test
        # The published package's unit suite.
        run: pnpm --filter './packages/plugin' test

      - name: Install-test helper unit tests
        # Fast, dependency-free node:test coverage for the install-test tooling
        # helpers (parsing, env I/O, source refresh).
        run: pnpm test:install-unit

      - name: Example app integration test
        # Boots Payload with the plugin (workspace source) and asserts the OAuth
        # collections + endpoints are wired and the schema pushes. Self-provides
        # its test env (see examples/payload-app/vitest.setup.ts). The full HTTP
        # OAuth handshake against the PUBLISHED package is covered by the install
        # test (`pnpm test:install`).
        run: pnpm --filter ./examples/payload-app test:int
